<svg width="840" height="250" viewBox="0 0 840 250" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Terminal intro: Doruk Bilge, CS and Applied Math at UMass Amherst">
  <style>
    .mono  { font: 15px ui-monospace, 'Cascadia Code', 'SF Mono', Menlo, Consolas, monospace; }
    .host  { fill: #3fb950; font-weight: 600; }
    .path  { fill: #58a6ff; }
    .cmd   { fill: #e6edf3; }
    .out   { fill: #8b949e; }
    .name  { fill: url(#ink); font-weight: 700; font-size: 17px; }
    .title { font: 12px ui-monospace, Menlo, Consolas, monospace; fill: #8b949e; }

    .fade  { opacity: 0; animation: fadein 0.45s ease-out forwards; }
    @keyframes fadein { to { opacity: 1; } }

    #type1 rect { animation: t1 0.7s steps(6, end) 0.5s forwards; }
    @keyframes t1 { to { width: 62px; } }
    #type2 rect { animation: t2 1.1s steps(13, end) 2.4s forwards; }
    @keyframes t2 { to { width: 122px; } }

    .cursor { animation: blink 1.1s steps(2, start) infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    @media (prefers-reduced-motion: reduce) {
      .fade { animation: none; opacity: 1; }
      #type1 rect { animation: none; width: 62px; }
      #type2 rect { animation: none; width: 122px; }
      .cursor { animation: none; }
    }
  </style>

  <defs>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#a78bfa" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0.55"/>
    </linearGradient>
    <clipPath id="type1"><rect x="184" y="66" width="0" height="22"/></clipPath>
    <clipPath id="type2"><rect x="184" y="130" width="0" height="22"/></clipPath>
  </defs>

  <!-- window -->
  <rect x="1.5" y="1.5" width="837" height="247" rx="12" fill="#0d1117" stroke="#30363d"/>
  <rect x="1.5" y="1.5" width="837" height="36" rx="12" fill="#161b22" stroke="#30363d"/>
  <rect x="2" y="20" width="836" height="18" fill="#161b22"/>
  <line x1="2" y1="38" x2="838" y2="38" stroke="#30363d"/>
  <rect x="2" y="39" width="836" height="2" fill="url(#edge)"/>

  <!-- traffic lights -->
  <circle cx="24" cy="20" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="20" r="6" fill="#27c93f"/>
  <text class="title" x="420" y="24" text-anchor="middle">doruk@umass: ~/portfolio</text>

  <!-- $ whoami -->
  <text class="mono" x="34" y="82"><tspan class="host">doruk@umass</tspan><tspan class="cmd">:</tspan><tspan class="path">~</tspan><tspan class="cmd">$</tspan></text>
  <g clip-path="url(#type1)">
    <text class="mono cmd" x="184" y="82">whoami</text>
  </g>
  <text class="mono name fade" x="34" y="114" style="animation-delay: 1.5s">Doruk Bilge<tspan class="out" font-weight="400" font-size="15px">&#160;&#160;&#183;&#160;&#160;CS &#215; Applied Math @ UMass Amherst&#160;&#160;&#183;&#160;&#160;minor in Business</tspan></text>

  <!-- $ cat focus.txt -->
  <text class="mono fade" x="34" y="146" style="animation-delay: 2.3s"><tspan class="host">doruk@umass</tspan><tspan class="cmd">:</tspan><tspan class="path">~</tspan><tspan class="cmd">$</tspan></text>
  <g clip-path="url(#type2)">
    <text class="mono cmd" x="184" y="146">cat focus.txt</text>
  </g>
  <text class="mono out fade" x="34" y="178" style="animation-delay: 3.7s">building from scratch: ml &#38; computer vision &#183; systems in C &#183; interpreters &#183; generative engines</text>

  <!-- final prompt -->
  <g class="fade" style="animation-delay: 4.3s">
    <text class="mono" x="34" y="212"><tspan class="host">doruk@umass</tspan><tspan class="cmd">:</tspan><tspan class="path">~</tspan><tspan class="cmd">$</tspan></text>
    <rect class="cursor" x="186" y="198" width="9" height="17" fill="#e6edf3"/>
  </g>
</svg>

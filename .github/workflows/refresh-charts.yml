name: refresh charts

on:
  schedule:
    - cron: "17 6 * * 1" # every Monday, 06:17 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "assets/langs-*.svg"
      - "assets/concepts-*.svg"
      - "data/languages.json"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild charts from live repo stats
        run: python scripts/build_charts.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit refreshed charts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets data/languages.json
          if git diff --cached --quiet; then
            echo "Charts already up to date."
          else
            git commit -m "chore: refresh charts"
            git push
          fi
